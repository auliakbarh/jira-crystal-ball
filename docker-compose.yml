services:
  db:
    image: postgres:16-alpine
    container_name: jcb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jcb
      POSTGRES_PASSWORD: jcb_password
      POSTGRES_DB: jira_crystal_ball
    ports:
      - "5432:5432"
    volumes:
      - jcb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jcb -d jira_crystal_ball"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  jcb_pgdata:
